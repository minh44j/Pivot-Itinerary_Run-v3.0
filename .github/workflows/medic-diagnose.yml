name: Medic Diagnose (redacted)

# Redacted, any-portal extraction diagnosis for a single flagged booking
# (see MEDIC.md). ALL output is PII-masked before it reaches this public repo's
# Action log. Dispatched by the medic loop (or manually) with a Gmail message id.
on:
  workflow_dispatch:
    inputs:
      message_id:
        description: "Gmail message id of the flagged booking to diagnose"
        required: true
        type: string

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run medic diagnosis
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          IMPERSONATE_USER: ${{ secrets.IMPERSONATE_USER }}
          AKBAR_FOLDER_NAME: ${{ secrets.AKBAR_FOLDER_NAME }}
          MEDIC_MSG_ID: ${{ inputs.message_id }}
        run: python tools/medic_diagnose.py
