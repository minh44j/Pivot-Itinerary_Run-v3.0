name: Akbar Debug (redacted)

# One-off diagnostic (§9): pull a single Akbar email's PDF attachment and run
# the live extract_akbar() against the real pdfplumber text. ALL output is
# PII-redacted (names / tickets / PNR / emails masked) before it reaches this
# public repo's Action log. Manual trigger only.
on:
  workflow_dispatch:
    inputs:
      message_id:
        description: "Gmail message id of the Akbar email to debug"
        required: true
        type: string

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Akbar debug
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          IMPERSONATE_USER: ${{ secrets.IMPERSONATE_USER }}
          AKBAR_DEBUG_MSG_ID: ${{ inputs.message_id }}
        run: python tools/akbar_debug.py
