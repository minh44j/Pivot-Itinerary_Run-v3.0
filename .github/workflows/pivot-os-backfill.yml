name: Pivot OS backfill

# Manual one-off. Re-sends EVERY processed booking to Pivot OS by re-extracting it
# from its source email. Idempotent (upsert by idempotency_key); PNRs already saved
# in Pivot OS are auto-hidden. Defaults to a DRY RUN (nothing persisted) so you can
# eyeball the tally first; set dry_run=false to persist.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (preview, nothing persisted)"
        type: boolean
        default: true
      limit:
        description: "Max bookings to process (0 = all)"
        type: string
        default: "0"

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Backfill to Pivot OS
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          IMPERSONATE_USER: ${{ secrets.IMPERSONATE_USER }}
          DRIVE_OUTPUT_FOLDER: ${{ secrets.DRIVE_OUTPUT_FOLDER }}
          AKBAR_FOLDER_NAME: ${{ secrets.AKBAR_FOLDER_NAME }}
          PIVOT_OS_SYNC_URL: ${{ secrets.PIVOT_OS_SYNC_URL }}
          PIVOT_OS_SYNC_SECRET: ${{ secrets.PIVOT_OS_SYNC_SECRET }}
          PIVOT_OS_DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
          BACKFILL_LIMIT: ${{ inputs.limit }}
        run: python main.py --backfill-pivot-os
